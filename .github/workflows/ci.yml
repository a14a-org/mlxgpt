name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # MLX only ships working runtime libraries for Apple Silicon (the pip wheel
    # on Linux is missing libmlx.so), and this project's target platform is the
    # Mac Mini cluster. macos-latest is Apple Silicon, so the MLX training code
    # and its tests run for real here.
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref || github.ref }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14.6"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install Python project + tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[train]" ruff pytest

      # Renovate (not Dependabot) updates package.json; regenerate the lockfile
      # on its PRs so --frozen-lockfile does not drift.
      - name: Install JS dependencies (regen lockfile for Renovate)
        run: |
          if [ "${{ github.actor }}" = "renovate[bot]" ]; then
            bun install
          else
            bun install --frozen-lockfile
          fi

      - name: Lint (Python)
        run: ruff check nanochat_mlx/ tests/

      - name: Lint (site tooling)
        run: bun run lint

      - name: Type check (site tooling)
        run: bun run typecheck

      - name: Verify site artifacts
        run: |
          test -f site/index.html
          test -f site/robots.txt
          test -f site/sitemap.xml
          test -f Dockerfile
          echo "Static site artifacts present"

      - name: Unit tests (Python / MLX)
        run: python -m pytest tests/ -v

      - name: Install Playwright browser
        run: bunx playwright install chromium

      - name: E2E smoke tests (site)
        run: bun run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  analytics-container-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Test restart-safe analytics injection
        run: sh tests/chilitrack-injection.test.sh

      - name: Build static-site container
        run: docker build --tag mlxgpt-site:ci .

      - name: Smoke production container and analytics tag
        run: |
          container_id="$(docker run --detach --publish 127.0.0.1:18080:80 \
            --env NEXT_PUBLIC_CHILITRACK_WEBSITE_ID=11111111-2222-4333-8444-555555555555 \
            mlxgpt-site:ci)"
          trap 'docker rm --force "$container_id" >/dev/null 2>&1 || true' EXIT
          for _ in $(seq 1 20); do
            if curl --fail --silent http://127.0.0.1:18080/ > /tmp/index.html; then
              break
            fi
            sleep 1
          done
          grep -q 'id="chilitrack-analytics"' /tmp/index.html
          grep -q 'data-website-id="11111111-2222-4333-8444-555555555555"' /tmp/index.html
          grep -q 'data-domains="mlxgpt.com"' /tmp/index.html
